<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-labelledby="title desc">
  <title id="title">MoKus favicon</title>
  <desc id="desc">A geometric M with a knowledge-transfer track between two nodes.</desc>

  <defs>
    <linearGradient id="bg" x1="32" y1="24" x2="224" y2="232" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f8fbff" />
      <stop offset="1" stop-color="#eef2ff" />
    </linearGradient>
    <linearGradient id="track" x1="72" y1="80" x2="196" y2="176" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2563eb" />
      <stop offset="1" stop-color="#ef4444" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.16" />
    </filter>
  </defs>

  <rect x="18" y="18" width="220" height="220" rx="54" fill="url(#bg)" />
  <rect x="18" y="18" width="220" height="220" rx="54" fill="none" stroke="#dbe4f0" stroke-width="4" />

  <path
    d="M70 184V72h28l30 43 30-43h28v112h-27v-67l-25 35h-12l-25-35v67z"
    fill="#0f172a"
    filter="url(#shadow)"
  />

  <path
    d="M78 82C102 70 124 76 143 94C158 108 169 128 184 150"
    fill="none"
    stroke="url(#track)"
    stroke-width="14"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <circle cx="76" cy="82" r="18" fill="#2563eb" />
  <circle cx="76" cy="82" r="8" fill="#bfdbfe" />

  <circle cx="190" cy="164" r="20" fill="#ef4444" />
  <circle cx="190" cy="164" r="9" fill="#fecaca" />
</svg>
